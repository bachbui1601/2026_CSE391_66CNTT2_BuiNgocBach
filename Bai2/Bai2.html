<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Goals</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="nav">
                <h2 class="logo">TRAVEL GOALS</h2>
                <ul class="menu">
                    <li>Destinations</li>
                    <li>About</li>
                </ul>
            </div>
        </div>
    </header>

    <!-- BANNER -->
    <section class="banner">
        <div class="banner-content">
            <h1>JOE'S TRAVEL PAGE</h1>
            <p>LET'S EXPLORE THE WORLD TOGETHER</p>
            <a href="#" class="btn">Discover places</a>
        </div>
    </section>

    <!-- HIGHLIGHTS -->
    <section class="highlights">
        <h2>HIGHLIGHTS</h2>

        <div class="cards">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="">
                <p>MIAMI <span>USA</span></p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b" alt="">
                <p>MUNICH <span>GERMANY</span></p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad" alt="">
                <p>BARCELONA <span>SPAIN</span></p>
            </div>
        </div>
    </section>

</body>
</html>
